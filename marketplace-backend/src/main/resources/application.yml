spring:
  application:
    name: marketplace-backend

  datasource:
    url: jdbc:mysql://localhost:3306/Shopverse?createDatabaseIfNotExist=true&useSSL=false&allowMultiQueries=true&allowPublicKeyRetrieval=true
    username: root
    password: Prajwal123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  mail:
    host: localhost
    port: 1025
    username: ''
    password: ''
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: "3cfa76ef14937c1c0ea519f8fc057a80fcd04a7e4a17a08f181e4b21daefc9dd"
    expiration-ms: 86400000    # 24 hours
    refresh-expiration-ms: 604800000  # 7 days
  file:
    upload-dir: ./uploads
  cors:
    allowed-origins: "http://localhost:5173,http://localhost:3000"
  cart:
    ttl-hours: 24
